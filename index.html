<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RŪNŌ Fire</title>

<style>

body{
  margin:0;
  height:100vh;
  background:#0b0b0b;
  font-family:Helvetica, Arial, sans-serif;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

/* flame column container */

.flame-column{
  position:absolute;
  bottom:0;
  width:160px;
  height:350px;
  filter:blur(6px);
}

/* animated flame shapes */

.flame{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 50% 90%, #fff59d 0%, #ff9800 30%, #ff5722 55%, transparent 70%);
  animation:flameMove 2.2s infinite ease-in-out;
}

.flame:nth-child(2){
  animation-delay:1s;
  transform:scale(.8);
  opacity:.8;
}

.flame:nth-child(3){
  animation-delay:.5s;
  transform:scale(.6);
  opacity:.6;
}

@keyframes flameMove{
  0%{
    transform:translateY(0) scaleX(.8);
    opacity:.9;
  }
  50%{
    transform:translateY(-30px) scaleX(1.1);
    opacity:1;
  }
  100%{
    transform:translateY(0) scaleX(.8);
    opacity:.9;
  }
}

h1{
  font-size:72px;
  letter-spacing:8px;
  z-index:10;
}

.tagline{
  font-size:22px;
  opacity:.85;
  margin-top:20px;
  z-index:10;
}

.models{
  margin-top:25px;
  opacity:.75;
  font-size:20px;
  z-index:10;
}

.launch{
  margin-top:40px;
  opacity:.55;
  z-index:10;
}

</style>

</head>

<body>

<div class="flame-column">
  <div class="flame"></div>
  <div class="flame"></div>
  <div class="flame"></div>
</div>

<h1>RŪNŌ</h1>

<div class="tagline">
Clean-burning pellet stoves
</div>

<div class="models">
Jr • Sr • Chief
</div>

<div class="launch">
Launching soon
</div>

</body>
</html>
