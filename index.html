<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RŪNŌ Fire</title>

<style>

body{
  margin:0;
  height:100vh;
  background:#0b0b0b;
  color:white;
  font-family:Helvetica, Arial, sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* flame container */

.flames{
  position:absolute;
  bottom:40%;
  width:200px;
  height:200px;
}

/* individual flames */

.flame{
  position:absolute;
  bottom:0;
  width:40px;
  height:80px;
  background:radial-gradient(ellipse at center,
  #fff176 0%,
  #ff9800 40%,
  #ff5722 70%,
  transparent 80%);
  border-radius:50%;
  animation:rise 2.5s infinite ease-in;
}

.flame:nth-child(1){left:20px; animation-delay:0s;}
.flame:nth-child(2){left:80px; animation-delay:.5s;}
.flame:nth-child(3){left:140px; animation-delay:1s;}

@keyframes rise{
  0%{
    transform:translateY(0) scale(.6);
    opacity:1;
  }
  100%{
    transform:translateY(-180px) scale(1.2);
    opacity:0;
  }
}

h1{
  font-size:72px;
  letter-spacing:8px;
  z-index:10;
}

p{
  font-size:22px;
  opacity:.8;
  z-index:10;
}

</style>

</head>

<body>

<div class="flames">
  <div class="flame"></div>
  <div class="flame"></div>
  <div class="flame"></div>
</div>

<h1>RŪNŌ</h1>

<p>Clean-burning pellet stoves</p>

<p>Jr • Sr • Chief</p>

<p style="margin-top:30px;opacity:.6;">Launching soon</p>

</body>
</html>
