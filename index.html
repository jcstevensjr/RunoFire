<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RŪNŌ Fire</title>

<style>

body{
  margin:0;
  height:100vh;
  background:#070707;
  font-family:Helvetica, Arial, sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* full width fire container */

.fire{
  position:absolute;
  bottom:0;
  width:100%;
  height:320px;
  display:flex;
  justify-content:space-evenly;
  align-items:flex-end;
}

/* individual flames */

.flame{
  width:80px;
  height:180px;
  background:
  radial-gradient(circle at 50% 80%, #fff6b0 0%, #ffcc00 20%, #ff7b00 50%, #ff3d00 70%, transparent 80%);
  border-radius:50% 50% 40% 40%;
  filter:blur(6px);
  animation:flame 2.2s infinite ease-in-out;
  opacity:.9;
}

/* randomize flame motion */

.flame:nth-child(odd){
  animation-duration:1.8s;
}

.flame:nth-child(3n){
  animation-duration:2.6s;
}

.flame:nth-child(4n){
  transform:scale(.8);
}

@keyframes flame{

  0%{
    transform:translateY(0) scaleX(.8);
  }

  50%{
    transform:translateY(-40px) scaleX(1.1);
  }

  100%{
    transform:translateY(0) scaleX(.8);
  }

}

/* text styling */

h1{
  font-size:72px;
  letter-spacing:8px;
  z-index:10;
}

.tagline{
  margin-top:20px;
  font-size:22px;
  opacity:.9;
  z-index:10;
}

.models{
  margin-top:25px;
  font-size:20px;
  opacity:.75;
  z-index:10;
}

.launch{
  margin-top:40px;
  opacity:.55;
  z-index:10;
}

</style>

</head>

<body>

<div class="fire">

<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>
<div class="flame"></div>

</div>

<h1>RŪNŌ</h1>

<div class="tagline">
Clean-burning pellet stoves
</div>

<div class="models">
Jr • Sr • Chief
</div>

<div class="launch">
Launching soon
</div>

</body>
</html>
