<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RŪNŌ Fire</title>

<style>

body{
  margin:0;
  height:100vh;
  background:#070707;
  font-family:Helvetica, Arial, sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* flame container */

.fire{
  position:absolute;
  bottom:0;
  width:200px;
  height:380px;
}

/* flame layers */

.flame{
  position:absolute;
  bottom:0;
  left:50%;
  width:120px;
  height:220px;
  transform:translateX(-50%);
  border-radius:60% 60% 40% 40%;
  filter:blur(6px);
  opacity:.9;
}

/* flame colors */

.flame1{
  background:radial-gradient(circle at 50% 80%, #fff8c6 0%, #ffcc00 20%, #ff7b00 50%, transparent 70%);
  animation:flameRise 3s infinite ease-in-out;
}

.flame2{
  background:radial-gradient(circle at 50% 80%, #fff4a6 0%, #ff9800 30%, #ff5722 60%, transparent 75%);
  animation:flameRise 2.2s infinite ease-in-out;
  transform:translateX(-50%) scale(.9);
}

.flame3{
  background:radial-gradient(circle at 50% 80%, #ffe082 0%, #ff6f00 40%, #ff3d00 65%, transparent 80%);
  animation:flameRise 1.8s infinite ease-in-out;
  transform:translateX(-50%) scale(.7);
}

/* movement */

@keyframes flameRise{

  0%{
    transform:translateX(-50%) translateY(0) scaleX(.8);
    opacity:.9;
  }

  25%{
    transform:translateX(-48%) translateY(-25px) scaleX(1.1);
  }

  50%{
    transform:translateX(-52%) translateY(-40px) scaleX(.9);
  }

  75%{
    transform:translateX(-49%) translateY(-20px) scaleX(1.05);
  }

  100%{
    transform:translateX(-50%) translateY(0) scaleX(.8);
    opacity:.9;
  }

}

/* text styling */

h1{
  font-size:72px;
  letter-spacing:8px;
  z-index:10;
}

.tagline{
  margin-top:20px;
  font-size:22px;
  opacity:.9;
  z-index:10;
}

.models{
  margin-top:25px;
  font-size:20px;
  opacity:.75;
  z-index:10;
}

.launch{
  margin-top:40px;
  opacity:.55;
  z-index:10;
}

</style>

</head>

<body>

<div class="fire">
  <div class="flame flame1"></div>
  <div class="flame flame2"></div>
  <div class="flame flame3"></div>
</div>

<h1>RŪNŌ</h1>

<div class="tagline">
Clean-burning pellet stoves
</div>

<div class="models">
Jr • Sr • Chief
</div>

<div class="launch">
Launching soon
</div>

</body>
</html>
